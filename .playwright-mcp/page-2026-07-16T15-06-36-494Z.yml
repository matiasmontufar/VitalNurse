                  - listitem [ref=f60e1816]: Deﬁnir los tres pilares medioambientales, sociales y de gobierno (ESG) que ayudan a guiar la sostenibilidad
                  - listitem [ref=f60e1817]: Seleccionar las formas adecuadas en que las empresas pueden aplicar las iniciativas de ESG
                  - listitem [ref=f60e1818]: Describir las principales iniciativas empresariales en materia de sostenibilidad
                  - listitem [ref=f60e1819]: Identificar cómo las tecnologías avanzadas pueden promover la sostenibilidad
                  - listitem [ref=f60e1820]: Practicar la sostenibilidad en su propia vida
